<!-- user_list.html -->
{% extends "layout.html" %}

{% block title %}Список пользователей{% endblock %}

{% block content %}
<h2>Список пользователей</h2>

<!-- Поисковая строка для фильтрации пользователей -->
<div class="row g-2 mb-3">
    <div class="col-md-6">
        <input type="text" id="search" class="form-control" placeholder="Поиск по имени или email">
    </div>
    <div class="col-md-3">
        <select id="roleFilter" class="form-select">
            <option value="all" selected>Все роли</option>
            <option value="customer">Клиенты</option>
            <option value="operator">Операторы</option>
            <option value="admin">Администраторы</option>
        </select>
    </div>
    <div class="col-md-2">
        <select id="pageSizeSelect" class="form-select">
            <option value="10" selected>10 / стр.</option>
            <option value="20">20 / стр.</option>
            <option value="50">50 / стр.</option>
        </select>
    </div>
    <div class="col-md-1">
        <button type="button" id="resetFilters" class="btn btn-outline-secondary w-100">Сбросить</button>
    </div>
</div>

<!-- Таблица для отображения списка пользователей -->
<table class="table table-striped mt-4">
    <thead>
        <tr>
            <th class="sortable" data-sort="id" role="button">ID <span class="sort-indicator"></span></th>
            <th class="sortable" data-sort="name" role="button">Имя <span class="sort-indicator"></span></th>
            <th class="sortable" data-sort="email" role="button">Email <span class="sort-indicator"></span></th>
            <th class="sortable" data-sort="role" role="button">Роль <span class="sort-indicator"></span></th>
            <th>Действия</th>
        </tr>
    </thead>
    <tbody id="userTableBody">
        <!-- Данные будут загружены через JS -->
    </tbody>
</table>
<div class="d-flex justify-content-between">
    <nav aria-label="Pagination">
        <ul class="pagination" id="paginationContainer">
            <!-- Элементы пагинации будут добавлены через JS -->
        </ul>
    </nav>
</div>

<script src="/static/js/userlist.js?v=20260418-3"></script>
{% endblock %}
